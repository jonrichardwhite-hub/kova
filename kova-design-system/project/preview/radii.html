<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; display: flex; gap: 18px; align-items: center; justify-content: center; background: var(--color-bg); flex-wrap: wrap; }
  .c { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .t { width: 92px; height: 56px; background: var(--color-surface); border: 1.5px solid var(--color-accent); }
  .n { font-size: 11px; font-weight: 600; color: var(--color-ink); }
  .p { font-family: var(--font-mono); font-size: 9px; color: var(--color-ink-muted); }
</style></head>
<body>
  <div class="c"><div class="t" style="border-radius:6px"></div><div class="n">xs</div><div class="p">6px</div></div>
  <div class="c"><div class="t" style="border-radius:8px"></div><div class="n">sm</div><div class="p">8px</div></div>
  <div class="c"><div class="t" style="border-radius:12px"></div><div class="n">md</div><div class="p">12px</div></div>
  <div class="c"><div class="t" style="border-radius:16px"></div><div class="n">lg</div><div class="p">16px</div></div>
  <div class="c"><div class="t" style="border-radius:999px"></div><div class="n">pill</div><div class="p">999</div></div>
</body></html>
