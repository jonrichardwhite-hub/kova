<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 14px; background: var(--color-bg); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw {
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    border: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
  }
  .fill { height: 74px; }
  .meta { padding: 10px 12px 12px; }
  .name { font-size: 11px; font-weight: 600; color: var(--color-ink); letter-spacing: -0.1px; }
  .hex { font-family: var(--font-mono); font-size: 8.5px; color: var(--color-ink-muted); letter-spacing: 0.03em; margin-top: 3px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw">
      <div class="fill" style="background:#F5F5F0; border-bottom: 1px solid var(--border-subtle);"></div>
      <div class="meta"><div class="name">bg / Snow White</div><div class="hex">#F5F5F0</div></div>
    </div>
    <div class="sw">
      <div class="fill" style="background:#FFFFFF; border-bottom: 1px solid var(--border-default);"></div>
      <div class="meta"><div class="name">white</div><div class="hex">#FFFFFF</div></div>
    </div>
    <div class="sw">
      <div class="fill" style="background:#2B2F36;"></div>
      <div class="meta"><div class="name">text / Ink</div><div class="hex">#2B2F36</div></div>
    </div>
    <div class="sw">
      <div class="fill" style="background:rgba(43,47,54,0.7);"></div>
      <div class="meta"><div class="name">text-soft</div><div class="hex">rgba(43,47,54,0.7)</div></div>
    </div>
    <div class="sw">
      <div class="fill" style="background:rgba(43,47,54,0.45);"></div>
      <div class="meta"><div class="name">text-muted</div><div class="hex">rgba(43,47,54,0.45)</div></div>
    </div>
  </div>
</body></html>
