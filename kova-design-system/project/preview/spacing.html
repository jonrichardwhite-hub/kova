<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; align-items: end; background: var(--color-bg); }
  .c { display: flex; flex-direction: column; align-items: center; gap: 6px; background: var(--color-surface); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 14px 8px; }
  .bar { width: 100%; background: var(--color-accent); border-radius: 2px; }
  .n { font-size: 10px; font-weight: 600; color: var(--color-ink); }
  .p { font-family: var(--font-mono); font-size: 9px; color: var(--color-ink-muted); }
</style></head>
<body>
  <div class="c"><div class="bar" style="width:4px;height:64px"></div><div class="n">space-1</div><div class="p">4</div></div>
  <div class="c"><div class="bar" style="width:8px;height:64px"></div><div class="n">space-2</div><div class="p">8</div></div>
  <div class="c"><div class="bar" style="width:12px;height:64px"></div><div class="n">space-3</div><div class="p">12</div></div>
  <div class="c"><div class="bar" style="width:16px;height:64px"></div><div class="n">space-4</div><div class="p">16</div></div>
  <div class="c"><div class="bar" style="width:20px;height:64px"></div><div class="n">space-5</div><div class="p">20</div></div>
  <div class="c"><div class="bar" style="width:24px;height:64px"></div><div class="n">space-6</div><div class="p">24</div></div>
  <div class="c"><div class="bar" style="width:28px;height:64px"></div><div class="n">space-7</div><div class="p">28</div></div>
  <div class="c"><div class="bar" style="width:32px;height:64px"></div><div class="n">space-8</div><div class="p">32</div></div>
</body></html>
