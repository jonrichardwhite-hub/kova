<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; background: var(--color-bg); }
  .row { display: grid; grid-template-columns: 90px 1fr; gap: 20px; align-items: baseline; padding: 10px 0; border-bottom: 1px dashed var(--border-subtle); }
  .row:last-child { border: 0; }
  .meta { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.075em; color: var(--color-ink-muted); font-weight: 600; text-transform: uppercase; }
  .spec { font-size: 11px; color: rgba(43,51,61,0.7); }
</style></head>
<body>
  <div class="row">
    <div><div class="meta">Hero</div><div class="spec">Playfair 200 · 56px</div></div>
    <div style="font-family: 'Playfair Display', Georgia, serif; font-weight: 200; font-size: 40px; letter-spacing: -0.025em; line-height: 1.05; color: var(--color-ink);">Reads the way your best pharmacist does.</div>
  </div>
  <div class="row">
    <div><div class="meta">Display</div><div class="spec">Playfair 200 · 36px</div></div>
    <div style="font-family: 'Playfair Display', Georgia, serif; font-weight: 200; font-size: 30px; letter-spacing: -0.02em; line-height: 1.1; color: var(--color-ink);">Three numbers that move the P&amp;L.</div>
  </div>
  <div class="row">
    <div><div class="meta">Feature</div><div class="spec">Playfair 200 · 28px</div></div>
    <div style="font-family: 'Playfair Display', Georgia, serif; font-weight: 200; font-size: 24px; letter-spacing: -0.02em; color: var(--color-ink);">24/7 trading, without 24/7 rosters.</div>
  </div>
</body></html>
