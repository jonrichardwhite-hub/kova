<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
  .sw { border-radius: 10px; padding: 12px; border: 1px solid var(--border-subtle); background: var(--color-surface); display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 44px; border-radius: 6px; }
  .name { font-size: 11px; font-weight: 600; color: var(--color-ink); }
  .hex { font-family: var(--font-mono); font-size: 9px; color: var(--color-ink-muted); letter-spacing: 0.04em; }
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#C4584A"></div><div class="name">aero</div><div class="hex">#C4584A</div></div>
  <div class="sw"><div class="chip" style="background:#3A8B6A"></div><div class="name">rad</div><div class="hex">#3A8B6A</div></div>
  <div class="sw"><div class="chip" style="background:#5B8EC9"></div><div class="name">fin</div><div class="hex">#5B8EC9</div></div>
  <div class="sw"><div class="chip" style="background:#7B6AA0"></div><div class="name">law</div><div class="hex">#7B6AA0</div></div>
  <div class="sw"><div class="chip" style="background:#C4884A"></div><div class="name">hum</div><div class="hex">#C4884A</div></div>
</body></html>
