<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
  .sw { border-radius: 10px; padding: 12px; border: 1px solid var(--border-subtle); background: var(--color-surface); display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 44px; border-radius: 6px; border: 1px solid rgba(43,47,54,0.05); }
  .name { font-size: 11px; font-weight: 600; color: var(--color-ink); }
  .hex { font-family: var(--font-mono); font-size: 9px; color: var(--color-ink-muted); letter-spacing: 0.04em; }
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#4A79B8"></div><div class="name">Regatta</div><div class="hex">#4A79B8 · accent</div></div>
  <div class="sw"><div class="chip" style="background:#3A68A0"></div><div class="name">Regatta Hover</div><div class="hex">#3A68A0</div></div>
  <div class="sw"><div class="chip" style="background:#6FAED1"></div><div class="name">Alaskan Blue</div><div class="hex">#6FAED1 · link</div></div>
  <div class="sw"><div class="chip" style="background:#C8B6A6"></div><div class="name">Doeskin</div><div class="hex">#C8B6A6 · taupe</div></div>
  <div class="sw"><div class="chip" style="background:#FFD88F"></div><div class="name">Gold</div><div class="hex">#FFD88F · accent</div></div>
</body></html>
