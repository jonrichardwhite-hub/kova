<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: var(--color-bg); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; min-height: 100%; }
  .tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 28px 16px; min-height: 220px; }
  .tile.bg { background: var(--color-bg); }
  .tile.w { background: #fff; }
  .tile.dark { background: var(--color-ink); }
  .lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; color: var(--color-ink-muted); }
  .tile.dark .lbl { color: rgba(255,255,255,0.55); }
  .wm { font-family: var(--font-sans); font-weight: 300; font-size: 36px; letter-spacing: 10px; color: var(--color-ink); }
  .wm.onDark { color: var(--color-bg); }
  .wm.alaskan { color: #6FAED1; }
</style></head>
