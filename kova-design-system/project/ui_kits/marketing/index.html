<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kova · Autonomous pharmacy platform</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="site.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    function MarketingNav() {
      return (
        <nav className="mk-nav">
          <a className="mk-logo" href="#">KOVA</a>
          <div className="mk-links">
            <a href="#">Product</a>
            <a href="#">Specialists <span style={{opacity:0.5}}>▾</span></a>
            <a href="#">About</a>
          </div>
          <div className="mk-actions">
            <button className="btn-ghost">Sign in</button>
            <button className="btn-pill">Book demo</button>
          </div>
        </nav>
      );
    }

    function Hero() {
      return (
        <>
          <section className="mk-hero-frame">
            <div className="mk-hero">
              <div>
                <div className="kova-tag">AUTONOMOUS PHARMACY PLATFORM</div>
                <h1 className="kova-hero" style={{marginTop: 20}}>
                  Autonomous pharmacy, with a <strong>pharmacist</strong> still in the loop.
                </h1>
                <p className="kova-body-lg" style={{marginTop: 24, maxWidth: 500}}>
                  Kova is a clinical reasoning platform and an autonomous
                  dispensing kiosk, built for retail pharmacy. Twenty four
                  hour access, documented decisions, and time back on the bench.
                </p>
                <div className="mk-hero-actions">
                  <button className="btn-primary">See the product</button>
                  <button className="btn-secondary">Book a demo</button>
                </div>
              </div>
              <div className="mk-hero-visual" aria-hidden="true">
                <div className="mk-hero-device">
                  <div className="mk-hero-device-top">
                    <span className="mk-hero-device-wm">KOVA</span>
                    <span className="mk-hero-device-tag">STEP 01 · WELCOME</span>
                  </div>
                  <div className="mk-hero-device-body">
                    <div className="mk-hero-device-greet">Good morning.</div>
                    <div className="mk-hero-device-sub">Tap below to begin a private consult.</div>
                    <div className="mk-hero-device-cta">Begin consult</div>
                  </div>
                </div>
              </div>
            </div>
          </section>
          <div className="mk-supported">
            <div className="mk-supported-label">SUPPORTED BY</div>
            <div className="mk-supported-row">
              <span>Partner one</span>
              <span>Partner two</span>
              <span>Partner three</span>
              <span>Partner four</span>
            </div>
          </div>
        </>
      );
    }

    function StatGrid() {
      const stats = [
        {n: '90', u: '%', t: 'of drug interaction alerts get overridden. Your safety system is noise.'},
        {n: '53', u: '%', t: 'pharmacist burnout. Your most expensive role is your most at risk role.'},
        {n: '$40', u: 'B', t: 'annual medication error cost in the US. Every script is a liability surface.'},
      ];
      return (
        <section className="mk-section">
          <div className="kova-display" style={{maxWidth: 780, marginBottom: 36}}>
            Your pharmacists are drowning. Your overrides are climbing. Your stores close at 6pm.
          </div>
          <div className="mk-stat-grid">
            {stats.map((s, i) => (
              <div className="mk-stat" key={i}>
                <div className="mk-stat-num">{s.n}<small>{s.u}</small></div>
                <div className="mk-stat-label">{s.t}</div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function Pillars() {
      const items = [
        {t: 'Staff leverage.', d: 'Free your pharmacists from 200+ insurance rejections a day, routine counseling, and queue pressure. Give them back the hours they were hired for.'},
        {t: '24/7 trading, without 24/7 rosters.', d: 'Collection, counseling, and refill processing continue after the shutter comes down. No shift premium, no overtime, no gap in service.'},
        {t: 'Documented decisions.', d: 'Every override, every interaction, every counseling moment is logged with clinical rationale. Audit-ready by default.'},
      ];
      const icons = [
        <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>,
      ];
      return (
        <section className="mk-section">
          <div className="kova-tag">WHY RETAIL PHARMACY CHAINS PICK KOVA</div>
          <div className="kova-display" style={{marginTop: 16, marginBottom: 40}}>
            Three numbers that move the P&amp;L.
          </div>
          <div className="mk-pillars">
            {items.map((it, i) => (
              <div className="mk-pillar" key={i}>
                <div className="mk-pillar-icon">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[i]}
                  </svg>
                </div>
                <div className="mk-pillar-title">{it.t}</div>
                <div className="mk-pillar-text">{it.d}</div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="mk-footer">
          <div className="mk-footer-inner">
            <div>
              <div className="kova-wordmark" style={{fontSize: 24, letterSpacing: '8px'}}>KOVA</div>
              <p className="kova-body-sm" style={{marginTop: 12, maxWidth: 260}}>
                Autonomous pharmacy, with a pharmacist still in the loop.
              </p>
            </div>
            <div className="mk-foot-col">
              <div className="mk-foot-head">Product</div>
              <a>Platform</a><a>Kiosk</a><a>Specialists</a>
            </div>
            <div className="mk-foot-col">
              <div className="mk-foot-head">Company</div>
              <a>About</a><a>Careers</a><a>Press</a>
            </div>
            <div className="mk-foot-col">
              <div className="mk-foot-head">Trust</div>
              <a>Privacy</a><a>Security</a><a>Regulatory</a>
            </div>
          </div>
          <div className="mk-foot-bottom">
            <span className="kova-mono-tag">© 2026 KOVA HEALTH · MELBOURNE</span>
          </div>
        </footer>
      );
    }

    function App() {
      return (
        <div data-screen-label="Marketing · Home">
          <MarketingNav/>
          <Hero/>
          <StatGrid/>
          <Pillars/>
          <Footer/>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
